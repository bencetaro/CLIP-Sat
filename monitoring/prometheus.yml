global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - ./rules.yml

scrape_configs:
  - job_name: "inference_stats"
    scrape_interval: 10s
    scrape_timeout: 10s
    honor_labels: false
    honor_timestamps: true
    metrics_path: /metrics
    static_configs:
      - targets: ["fastapi:8000"]

  - job_name: "node-exporter"
    scrape_interval: 10s
    scrape_timeout: 10s
    honor_labels: false
    honor_timestamps: true
    metrics_path: /metrics
    static_configs:
      - targets: ["node-exporter:9100"]
