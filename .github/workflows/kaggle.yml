name: Kaggle CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - feature/**
    paths:
      - src/training/dataset/**
      - src/training/notebook/**

jobs:
  kaggle-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install kaggle pyyaml wandb

      - name: Configure Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"${{ secrets.KAGGLE_USERNAME }}\",\"key\":\"${{ secrets.KAGGLE_KEY }}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Check dataset changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dataset:
              - src/training/dataset/**
            notebook:
              - src/training/notebook/**

      - name: Push dataset
        if: steps.filter.outputs.dataset == 'true'
        run: |
          kaggle datasets version \
            -p src/training/dataset \
            -m "Auto update $GITHUB_SHA" \
            --dir-mode zip || \
          kaggle datasets create -p src/training/dataset

      - name: Push notebook
        if: steps.filter.outputs.notebook == 'true' || steps.filter.outputs.dataset == 'true'
        run: |
          kaggle kernels push -p src/training/notebook

      - name: Wait for notebook completion
        if: steps.filter.outputs.notebook == 'true' || steps.filter.outputs.dataset == 'true'
        run: |
          completed=false
          for i in {1..100}; do
            status=$(kaggle kernels status ${{ secrets.KAGGLE_USERNAME }}/satellite-imagery-training | grep "status")
            echo $status
            if echo "$status" | grep -q "KernelWorkerStatus.COMPLETE"; then
              completed=true
              break
            fi
            if echo "$status" | grep -q "KernelWorkerStatus.ERROR"; then
              echo "Kaggle notebook run failed"
              exit 1
            fi
            sleep 30
          done

          if [ "$completed" != "true" ]; then
            echo "Timed out waiting for Kaggle notebook completion"
            exit 1
          fi

      - name: Download Kaggle outputs
        if: steps.filter.outputs.notebook == 'true' || steps.filter.outputs.dataset == 'true'
        run: |
          mkdir -p output
          kaggle kernels output ${{ secrets.KAGGLE_USERNAME }}/satellite-imagery-training -p output

      - name: Sync with W&B
        if: steps.filter.outputs.notebook == 'true' || steps.filter.outputs.dataset == 'true'
        run: |
          wandb login --relogin "${WANDB_API_KEY}"
          unzip -o output/wandb_run.zip -d output/
          
          echo "Discovered W&B offline runs:"
          find output/wandb -maxdepth 3 \( -type d -name 'offline-run-*' -o -type f -name 'run-*.wandb' \) | sort

          mapfile -t run_files < <(find output/wandb -type f -name 'run-*.wandb' | sort)
          if [ ${#run_files[@]} -eq 0 ]; then
            echo "No offline W&B run files found under output/wandb"
            exit 1
          fi

          sync_args=(--include-offline)
          if [ -n "${WANDB_ENTITY:-}" ]; then
            sync_args+=(--entity "${WANDB_ENTITY}")
          fi

          for run_file in "${run_files[@]}"; do
            echo "Syncing ${run_file}"
            wandb sync "${run_file}" "${sync_args[@]}"
          done
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}
